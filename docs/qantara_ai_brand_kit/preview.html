<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Qantara AI — Brand Preview</title>
  <style>
    :root {
      --background: #050914;
      --card: #0b1220;
      --foreground: #f8fafc;
      --muted: #94a3b8;
      --primary: #22d3ee;
      --secondary: #d6a85a;
      --border: rgba(148, 163, 184, 0.18);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Geist, IBM Plex Sans, Segoe UI, Arial, sans-serif;
      background:
        radial-gradient(circle at 20% 10%, rgba(34, 211, 238, 0.12), transparent 35%),
        radial-gradient(circle at 80% 30%, rgba(214, 168, 90, 0.10), transparent 30%),
        var(--background);
      color: var(--foreground);
      padding: 48px;
    }
    main { max-width: 1120px; margin: 0 auto; }
    h1 { font-size: clamp(36px, 6vw, 72px); letter-spacing: -0.06em; margin: 0 0 12px; }
    p { color: var(--muted); font-size: 18px; line-height: 1.6; }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 20px; margin-top: 32px; }
    .card {
      border: 1px solid var(--border);
      background: rgba(11, 18, 32, 0.82);
      border-radius: 28px;
      padding: 28px;
      min-height: 240px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card.light { background: #f8fafc; }
    .card.small img { width: 160px; }
    img { max-width: 100%; height: auto; display: block; }
    .palette { display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); gap: 12px; margin-top: 28px; }
    .swatch { border: 1px solid var(--border); border-radius: 18px; overflow: hidden; background: var(--card); }
    .color { height: 88px; }
    .label { padding: 12px; font-size: 13px; color: var(--muted); }
    @media (max-width: 820px) {
      body { padding: 24px; }
      .grid, .palette { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <h1>Qantara AI — identité visuelle</h1>
    <p>Logo vectoriel, palette et direction graphique pour un cabinet IA tunisien haut de gamme.</p>

    <section class="grid">
      <div class="card"><img src="./qantara-ai-logo-primary.svg" alt="Logo Qantara AI principal"></div>
      <div class="card light"><img src="./qantara-ai-logo-light.svg" alt="Logo Qantara AI fond clair"></div>
      <div class="card small"><img src="./qantara-ai-mark.svg" alt="Symbole Qantara AI"></div>
      <div class="card small"><img src="./qantara-ai-favicon.svg" alt="Favicon Qantara AI"></div>
    </section>

    <section class="palette">
      <div class="swatch"><div class="color" style="background:#050914"></div><div class="label">#050914<br>Background</div></div>
      <div class="swatch"><div class="color" style="background:#0B1220"></div><div class="label">#0B1220<br>Card</div></div>
      <div class="swatch"><div class="color" style="background:#F8FAFC"></div><div class="label">#F8FAFC<br>Foreground</div></div>
      <div class="swatch"><div class="color" style="background:#94A3B8"></div><div class="label">#94A3B8<br>Muted</div></div>
      <div class="swatch"><div class="color" style="background:#22D3EE"></div><div class="label">#22D3EE<br>Primary</div></div>
      <div class="swatch"><div class="color" style="background:#D6A85A"></div><div class="label">#D6A85A<br>Secondary</div></div>
    </section>
  </main>
</body>
</html>
