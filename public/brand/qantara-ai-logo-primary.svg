<svg width="920" height="220" viewBox="0 0 920 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Qantara AI — logo principal</title>
  <desc id="desc">Logo horizontal de Qantara AI avec un symbole Q intégrant une arche de pont.</desc>
  <defs>
    <linearGradient id="qantaraGradient" x1="14" y1="22" x2="166" y2="166" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67E8F9"/>
      <stop offset="0.48" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#D6A85A"/>
    </linearGradient>
    <linearGradient id="bridgeGradient" x1="36" y1="76" x2="128" y2="103" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D6A85A"/>
      <stop offset="1" stop-color="#F5D48A"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.133 0 0 0 0 0.827 0 0 0 0 0.933 0 0 0 0.35 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(34 28)" filter="url(#softGlow)">
    <path d="M82 14C119.555 14 150 44.445 150 82C150 119.555 119.555 150 82 150C44.445 150 14 119.555 14 82C14 44.445 44.445 14 82 14Z" stroke="url(#qantaraGradient)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M126 126L162 162" stroke="#D6A85A" stroke-width="14" stroke-linecap="round"/>
    <path d="M43 93C51.5 67.5 112.5 67.5 121 93" stroke="url(#bridgeGradient)" stroke-width="8" stroke-linecap="round"/>
    <path d="M36 104H128" stroke="#CBD5E1" stroke-opacity="0.76" stroke-width="6" stroke-linecap="round"/>
    <path d="M52 104V90" stroke="#22D3EE" stroke-opacity="0.76" stroke-width="5" stroke-linecap="round"/>
    <path d="M82 104V76" stroke="#22D3EE" stroke-opacity="0.86" stroke-width="5" stroke-linecap="round"/>
    <path d="M112 104V90" stroke="#22D3EE" stroke-opacity="0.76" stroke-width="5" stroke-linecap="round"/>
    <circle cx="82" cy="76" r="4" fill="#F8FAFC"/>
  </g>

  <g transform="translate(242 55)">
    <text x="0" y="62" fill="#F8FAFC" font-family="Inter, Geist, IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="72" font-weight="760" letter-spacing="-2.6">Qantara</text>
    <text x="342" y="62" fill="#22D3EE" font-family="Inter, Geist, IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="72" font-weight="760" letter-spacing="-2.6">AI</text>
    <text x="3" y="105" fill="#94A3B8" font-family="Inter, Geist, IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="22" font-weight="500" letter-spacing="0.9">CONSULTING · ACADEMY · STUDIO · GOVERNANCE</text>
  </g>
</svg>
