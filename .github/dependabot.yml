version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Africa/Tunis"
    open-pull-requests-limit: 5
    groups:
      next-stack:
        patterns:
          - "next"
          - "react"
          - "react-dom"
      tooling:
        patterns:
          - "typescript"
          - "eslint*"
          - "prettier"
          - "vitest"
          - "@playwright/test"
          - "@vitest/coverage-v8"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:30"
      timezone: "Africa/Tunis"
