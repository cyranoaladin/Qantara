name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 5 * * 1"

permissions:
  contents: read

jobs:
  security:
    name: Security checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency audit
        run: pnpm audit --audit-level moderate

      - name: Ensure real env files are not committed
        run: |
          set -euo pipefail
          if git ls-files | grep -E '(^|/)\.env(\.|$)' | grep -v '^\.env\.example$'; then
            echo "A real environment file is tracked."
            exit 1
          fi

      - name: Secret scan
        run: |
          set -euo pipefail

          password_url_pattern='postgresql:'
          password_url_pattern="${password_url_pattern}"'//[^"'\'' ]+:[^"'\'' ]+@'
          openai_key_pattern='s''k-[A-Za-z0-9]{20,}'
          github_classic_pattern='g''hp_[A-Za-z0-9]{20,}'
          github_fine_grained_pattern='github''_pat_[A-Za-z0-9_]{20,}'
          resend_key_pattern='r''e_[A-Za-z0-9_=-]{24,}'
          secret_key_pattern="(${openai_key_pattern}|${github_classic_pattern}|${github_fine_grained_pattern}|${resend_key_pattern})"

          if git grep -nE "(${password_url_pattern}|${secret_key_pattern})" -- ':!README.md' ':!.env.example' ':!docs/**'; then
            echo "Potential hardcoded credential found."
            exit 1
          fi

          resend_var='RESEND_API''_KEY'
          admin_var='ADMIN''_TOKEN'
          if git grep -nE "(${resend_var}=[\"']?[A-Za-z0-9_=-]{16,}|${admin_var}=[\"']?[A-Za-z0-9_=-]{16,})" -- ':!README.md' ':!.env.example' ':!docs/**'; then
            echo "Potential assigned secret found."
            exit 1
          fi
