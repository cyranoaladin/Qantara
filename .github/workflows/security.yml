name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 5 * * 1"

permissions:
  contents: read

jobs:
  security:
    name: Security checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency audit
        run: pnpm audit --audit-level moderate

      - name: Ensure real env files are not committed
        run: |
          set -euo pipefail
          if git ls-files | grep -E '(^|/)\.env(\.|$)' | grep -v '^\.env\.example$'; then
            echo "A real environment file is tracked."
            exit 1
          fi

      - name: Secret scan
        run: |
          set -euo pipefail
          if git grep -nE '(postgresql://[^"'\'' ]+:[^"'\'' ]+@|sk-[A-Za-z0-9]{20,}|ghp_[A-Za-z0-9]{20,}|github_pat_[A-Za-z0-9_]{20,}|re_[A-Za-z0-9_=-]{24,})' -- ':!README.md' ':!.env.example' ':!docs/**'; then
            echo "Potential hardcoded credential found."
            exit 1
          fi
