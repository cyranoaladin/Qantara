name: Bug report
description: Signaler une régression ou un défaut produit.
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Résumé
      description: Décrivez le problème observé.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Étapes de reproduction
      placeholder: |
        1. Aller sur ...
        2. Cliquer sur ...
        3. Constater ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environnement
      placeholder: Navigateur, OS, viewport, branche ou commit.
    validations:
      required: false
  - type: textarea
    id: security
    attributes:
      label: Impact sécurité ou données
      description: Indiquez si le bug touche des formulaires, l'admin, des secrets ou des données personnelles.
    validations:
      required: false
